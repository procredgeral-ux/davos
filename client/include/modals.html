<!-- Skins Gallery Modal -->
<div id="skinsModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h4 class="modal-title">Skins Gallery</h4>
            <button type="button" class="modal-close" onclick="closeSkinsModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div id="skinsGrid" class="skins-grid">
                <!-- Skins will be loaded dynamically -->
            </div>
            <div class="loader-container" id="skinsLoader">
                <div class="loader"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="modal-btn modal-btn-secondary" onclick="closeSkinsModal()">Close</button>
            <button type="button" class="modal-btn modal-btn-primary" onclick="selectSkin()">Select</button>
        </div>
    </div>
</div>

<!-- Error/Info Modal -->
<div id="messageModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header" id="messageModalHeader">
            <h4 class="modal-title" id="messageModalTitle">Message</h4>
            <button type="button" class="modal-close" onclick="closeMessageModal()">&times;</button>
        </div>
        <div class="modal-body" id="messageModalBody">
            <p>Message content</p>
        </div>
        <div class="modal-footer">
            <button type="button" class="modal-btn modal-btn-secondary" onclick="closeMessageModal()">Close</button>
        </div>
    </div>
</div>

<!-- Case Opening Reward Modal -->
<div id="rewardModal" class="reward-overlay">
    <div class="reward-particles" id="rewardParticles"></div>
    <div class="reward-container">
        <div class="reward-glow" id="rewardGlow"></div>
        <div class="reward-item" id="rewardItem">
            <div class="reward-icon" id="rewardIcon">
                <i class="fas fa-crown"></i>
            </div>
            <div class="reward-rarity" id="rewardRarity">LEGENDARY</div>
            <h3 class="reward-name" id="rewardName">Dragon Crown</h3>
            <p class="reward-desc" id="rewardDesc">A crown forged in dragon fire</p>
        </div>
        <button class="reward-btn" onclick="collectReward()">
            <i class="fas fa-gift"></i> Collect Item
        </button>
    </div>
</div>
